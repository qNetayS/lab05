name: Linux CI (gcc & clang)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        compiler: [gcc, clang]
    env:
      CC: ${{ matrix.compiler }}
      CXX: ${{ matrix.compiler == 'gcc' && 'g++' || 'clang++' }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential lcov
      
      - name: Configure with tests
        run: cmake -H. -B_build -DBUILD_TESTS=ON
      
      - name: Build
        run: cmake --build _build
      
      - name: Run tests
        run: ctest --test-dir _build --output-on-failure
      
      - name: Generate coverage
        run: |
          cd _build
          cmake -H.. -B. -DBUILD_TESTS=ON -DCMAKE_CXX_FLAGS="--coverage" -DCMAKE_C_FLAGS="--coverage"
          cmake --build . --target banking
          ctest --output-on-failure
          lcov --capture --directory . --output-file coverage.info --no-external
          lcov --remove coverage.info '*/third-party/*' '*/tests/*' '*/usr/*' --output-file coverage_filtered.info
      
      - name: Upload to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          file: _build/coverage_filtered.info
          github-token: ${{ secrets.GITHUB_TOKEN }}
